name: weighbridgemanagement
description: "Weighbridge Management System - Smart weighbridge operations with Firebase backend."
publish_to: 'none'
version: 1.0.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.3
  cloud_firestore: ^5.6.7
  cloud_functions: ^5.2.3

  # State Management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Auth
  google_sign_in: ^6.2.2

  # UI
  google_fonts: ^6.2.1

  # Local Storage
  shared_preferences: ^2.3.4

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  connectivity_plus: ^6.1.4
  http: ^1.4.0
  http_parser: ^4.1.0
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_macos_video: ^1.1.4
  flutter_libserialport: ^0.4.0

  # Image Processing
  image: ^4.5.3

  # Printing
  pdf: ^3.11.2
  printing: ^5.14.2
  barcode: ^2.2.8
  barcode_widget: ^2.0.4

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  window_manager: ^0.5.1
  crypto: ^3.0.7
  encrypt: ^5.0.3
  package_info_plus: ^8.3.0
  file_picker: ^8.1.6
  csv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
