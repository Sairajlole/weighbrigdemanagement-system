<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Weighment Type Selection - Weighbridge Sys</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#508d4e",
                        "background-light": "#f6f7f6",
                        "background-dark": "#161c16",
                        "text-main": "#131613",
                        "text-muted": "#6f7c6e",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .material-symbols-outlined.fill { font-variation-settings: 'FILL' 1; }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-text-main font-display">
<div class="flex h-screen w-full overflow-hidden">
<!-- Sidebar -->
<aside class="flex w-72 flex-col border-r border-gray-200 dark:border-gray-800 bg-white dark:bg-[#1e1e1e] transition-all">
<div class="flex h-full flex-col justify-between p-4">
<div class="flex flex-col gap-6">
<!-- Brand -->
<div class="flex items-center gap-3 px-2">
<div class="flex items-center justify-center rounded-lg bg-primary/10 text-primary size-10 shrink-0">
<span class="material-symbols-outlined text-3xl">local_shipping</span>
</div>
<h1 class="text-text-main dark:text-white text-lg font-bold leading-normal">Weighbridge Sys</h1>
</div>
<!-- Navigation -->
<div class="flex flex-col gap-2">
<a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-text-muted dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-white/5 transition-colors group" href="#">
<span class="material-symbols-outlined group-hover:text-text-main dark:group-hover:text-white transition-colors">dashboard</span>
<span class="text-sm font-medium group-hover:text-text-main dark:group-hover:text-white transition-colors">Dashboard</span>
</a>
<!-- Active Item -->
<a class="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-primary text-white shadow-md shadow-primary/30" href="#">
<span class="material-symbols-outlined fill">scale</span>
<span class="text-sm font-bold">New Weighment</span>
</a>
<a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-text-muted dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-white/5 transition-colors group" href="#">
<span class="material-symbols-outlined group-hover:text-text-main dark:group-hover:text-white transition-colors">history</span>
<span class="text-sm font-medium group-hover:text-text-main dark:group-hover:text-white transition-colors">Transactions</span>
</a>
<a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-text-muted dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-white/5 transition-colors group" href="#">
<span class="material-symbols-outlined group-hover:text-text-main dark:group-hover:text-white transition-colors">bar_chart</span>
<span class="text-sm font-medium group-hover:text-text-main dark:group-hover:text-white transition-colors">Reports</span>
</a>
<a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-text-muted dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-white/5 transition-colors group" href="#">
<span class="material-symbols-outlined group-hover:text-text-main dark:group-hover:text-white transition-colors">settings</span>
<span class="text-sm font-medium group-hover:text-text-main dark:group-hover:text-white transition-colors">Settings</span>
</a>
</div>
</div>
<!-- User Profile / Bottom Actions -->
<div class="flex flex-col gap-2 pt-4 border-t border-gray-100 dark:border-gray-800">
<button class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-100 dark:hover:bg-white/5 text-text-muted dark:text-gray-400 transition-colors w-full text-left">
<span class="material-symbols-outlined">logout</span>
<span class="text-sm font-medium">Log Out</span>
</button>
</div>
</div>
</aside>
<!-- Main Content -->
<main class="flex-1 flex flex-col h-full overflow-y-auto bg-background-light dark:bg-background-dark">
<div class="layout-container flex h-full grow flex-col">
<div class="px-8 lg:px-12 xl:px-20 py-8 flex flex-col items-center w-full">
<div class="layout-content-container flex flex-col w-full max-w-[1024px] gap-8">
<!-- Header & Breadcrumbs Section -->
<div class="flex flex-col gap-4">
<!-- Breadcrumbs -->
<nav aria-label="Breadcrumb" class="flex">
<ol class="inline-flex items-center space-x-1 md:space-x-2 rtl:space-x-reverse">
<li class="inline-flex items-center">
<a class="inline-flex items-center text-sm font-semibold text-primary dark:text-primary hover:text-primary/80" href="#">
<span class="flex items-center justify-center w-5 h-5 me-2 text-xs border border-primary rounded-full shrink-0">1</span>
                                            Type Selection
                                        </a>
</li>
<li>
<div class="flex items-center">
<span class="material-symbols-outlined text-gray-400 mx-1 text-lg">chevron_right</span>
<span class="ms-1 text-sm font-medium text-gray-500 md:ms-2 dark:text-gray-400">
<span class="flex items-center justify-center w-5 h-5 me-2 text-xs border border-gray-300 dark:border-gray-600 rounded-full shrink-0 inline-flex">2</span>
                                                Vehicle Details
                                            </span>
</div>
</li>
<li aria-current="page">
<div class="flex items-center">
<span class="material-symbols-outlined text-gray-400 mx-1 text-lg">chevron_right</span>
<span class="ms-1 text-sm font-medium text-gray-500 md:ms-2 dark:text-gray-400">
<span class="flex items-center justify-center w-5 h-5 me-2 text-xs border border-gray-300 dark:border-gray-600 rounded-full shrink-0 inline-flex">3</span>
                                                Weighing Capture
                                            </span>
</div>
</li>
</ol>
</nav>
<!-- Heading -->
<div class="flex justify-between items-center">
<div>
<h1 class="text-text-main dark:text-white text-3xl font-extrabold leading-tight tracking-tight">New Weighment</h1>
<p class="text-text-muted dark:text-gray-400 mt-1">Select the type of transaction to begin.</p>
</div>
</div>
</div>
<!-- Cards Selection Section -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-4">
<!-- Card 1: Gross Weight (Selected) -->
<label class="cursor-pointer group relative">
<input checked="" class="peer sr-only" name="weighment_type" type="radio" value="gross"/>
<div class="h-full flex flex-col p-6 bg-white dark:bg-[#1e1e1e] rounded-xl border-2 border-primary shadow-lg shadow-primary/10 transition-all peer-checked:border-primary peer-checked:bg-primary/5 dark:peer-checked:bg-primary/10 hover:shadow-xl hover:shadow-primary/5">
<!-- Selected Checkmark Badge -->
<div class="absolute top-4 right-4 size-6 bg-primary text-white rounded-full flex items-center justify-center opacity-100 transition-opacity">
<span class="material-symbols-outlined text-sm font-bold">check</span>
</div>
<div class="flex items-start gap-4 mb-6">
<div class="bg-primary/10 p-3 rounded-lg text-primary">
<span class="material-symbols-outlined text-3xl">local_shipping</span>
</div>
<div>
<h3 class="text-text-main dark:text-white text-xl font-bold">Gross Weight</h3>
<span class="text-xs font-semibold uppercase tracking-wider text-primary bg-primary/10 px-2 py-1 rounded mt-1 inline-block">First Weighment</span>
</div>
</div>
<div class="w-full bg-center bg-no-repeat aspect-video bg-cover rounded-lg mb-4 opacity-90 group-hover:opacity-100 transition-opacity" data-alt="Illustration of a loaded heavy truck on a weighbridge" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuCcH38eUGrVxxUFWfLlcYwRJHyeiXR96hdpSV9F-D3SCeu_sygO4HKhRIPfuc_fwKYV1MncQBLWvICalGE2CFIIgYou4BnaiDORefK4J-kZmV0VjQl1ukbxkgOnJ36N67crdnXy0DQc6vOmk1SVTsoz1qh-vR_HWWzEWOZDOl4tTwFz4nb_SNCaO1BPZ9C1ptW3AN7GhCi-DOOnWq88izkLdKsGN4_yXB_XfuX-aDdXT_-a12KHNEde5ZWURiwu51b68fqobLvwLrw");'>
</div>
<div class="mt-auto pt-4 border-t border-gray-100 dark:border-gray-700">
<p class="text-text-muted dark:text-gray-400 text-sm leading-relaxed">
                                            For inbound loaded trucks entering the facility. Captures the total weight of the vehicle and cargo.
                                        </p>
</div>
</div>
</label>
<!-- Card 2: Tare Weight -->
<label class="cursor-pointer group relative">
<input class="peer sr-only" name="weighment_type" type="radio" value="tare"/>
<div class="h-full flex flex-col p-6 bg-white dark:bg-[#1e1e1e] rounded-xl border border-gray-200 dark:border-gray-700 shadow-sm transition-all peer-checked:border-primary peer-checked:border-2 peer-checked:shadow-lg peer-checked:shadow-primary/10 hover:border-primary/50 hover:shadow-md">
<!-- Selected Checkmark Badge (Hidden by default) -->
<div class="absolute top-4 right-4 size-6 bg-primary text-white rounded-full flex items-center justify-center opacity-0 peer-checked:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-sm font-bold">check</span>
</div>
<div class="flex items-start gap-4 mb-6">
<div class="bg-gray-100 dark:bg-gray-800 p-3 rounded-lg text-gray-500 dark:text-gray-400 group-hover:text-primary group-hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-3xl">no_transfer</span>
</div>
<div>
<h3 class="text-text-main dark:text-white text-xl font-bold group-hover:text-primary transition-colors">Tare Weight</h3>
<span class="text-xs font-semibold uppercase tracking-wider text-gray-500 bg-gray-100 dark:bg-gray-800 dark:text-gray-400 px-2 py-1 rounded mt-1 inline-block">Second Weighment</span>
</div>
</div>
<div class="w-full bg-center bg-no-repeat aspect-video bg-cover rounded-lg mb-4 opacity-70 grayscale group-hover:grayscale-0 group-hover:opacity-100 transition-all duration-300" data-alt="Illustration of an empty truck leaving a facility" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuANTZVKLh3uXjpg9lgbiHJ1UjkYljhDMpb31hd9RyDYMuGkZ1UmLhBgl2wnkXe-rwfLQy3DmSGhzcO3ip49g_RgMVm_Uvr7sNRa29XtfN2bT9m1DpczkgzG8NU7TfGzpKpkyQOid59QXgGgkVWs2zV3tFIaKLSyyXm31ZmKwFKxk7vMN9TiRgl8YXRw72sIv5_pG4z0YyJRm_yx7_wZtyDWZBIgVZVMZ1b2P5OvftM42jwBYAcPuV-19HlEm6uiamp4xTkMmON8EOc");'>
</div>
<div class="mt-auto pt-4 border-t border-gray-100 dark:border-gray-700">
<p class="text-text-muted dark:text-gray-400 text-sm leading-relaxed">
                                            For empty return trips or outbound trucks after unloading. Captures the empty weight of the vehicle.
                                        </p>
</div>
</div>
</label>
</div>
<!-- Action Footer -->
<div class="flex items-center justify-end pt-6 border-t border-gray-200 dark:border-gray-800 mt-2">
<button class="bg-primary hover:bg-primary/90 text-white font-bold py-3 px-8 rounded-lg shadow-lg shadow-primary/20 flex items-center gap-2 transition-transform active:scale-95">
<span>Start Weighment</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</div>
</div>
</div>
</main>
</div>
</body></html>
