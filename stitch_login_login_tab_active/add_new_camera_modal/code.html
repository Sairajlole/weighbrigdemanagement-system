<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Add New Camera - Weighbridge Management System</title>
<!-- Fonts and Icons -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1aec13",
                        "background-light": "#f6f8f6",
                        "background-dark": "#112210",
                        "surface-dark": "#162b14", 
                        "border-dark": "#2a4228",
                        "input-bg": "#1c2e1a",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem", 
                        "lg": "0.5rem", 
                        "xl": "0.75rem", 
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar for better aesthetics in dark mode */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #112210; 
        }
        ::-webkit-scrollbar-thumb {
            background: #2a4228; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #1aec13; 
        }
        
        /* Remove number input spinner */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex items-center justify-center p-4">
<!-- Modal Overlay -->
<div aria-hidden="true" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-40 transition-opacity"></div>
<!-- Modal Content -->
<div class="relative z-50 w-full max-w-[480px] bg-white dark:bg-surface-dark rounded-xl shadow-[0_20px_60px_-15px_rgba(0,0,0,0.8)] border border-gray-200 dark:border-border-dark flex flex-col overflow-hidden">
<!-- Header -->
<div class="flex items-center justify-between px-6 py-5 border-b border-gray-200 dark:border-border-dark bg-gray-50/50 dark:bg-[#132511]">
<div>
<h2 class="text-xl font-bold text-gray-900 dark:text-white leading-tight">Add New Camera</h2>
<p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Configure connection details for the unit.</p>
</div>
<button class="text-gray-400 hover:text-gray-600 dark:text-gray-400 dark:hover:text-white transition-colors p-1 rounded-lg hover:bg-gray-100 dark:hover:bg-white/5">
<span class="material-symbols-outlined text-[24px]">close</span>
</button>
</div>
<!-- Body / Form -->
<div class="p-6 flex flex-col gap-4 max-h-[75vh] overflow-y-auto">
<!-- Camera Name -->
<label class="flex flex-col gap-1.5">
<span class="text-sm font-medium text-gray-700 dark:text-gray-200">Camera Name</span>
<input class="form-input w-full rounded-lg bg-gray-50 dark:bg-input-bg border border-gray-300 dark:border-border-dark text-gray-900 dark:text-white focus:ring-1 focus:ring-primary focus:border-primary placeholder:text-gray-400 dark:placeholder:text-gray-500 h-11 px-3 text-sm transition-shadow" placeholder="e.g. Entrance Gate North" type="text"/>
</label>
<!-- IP Address and Port Row -->
<div class="flex gap-4">
<label class="flex flex-col gap-1.5 flex-[3]">
<span class="text-sm font-medium text-gray-700 dark:text-gray-200">IP Address</span>
<input class="form-input w-full rounded-lg bg-gray-50 dark:bg-input-bg border border-gray-300 dark:border-border-dark text-gray-900 dark:text-white focus:ring-1 focus:ring-primary focus:border-primary placeholder:text-gray-400 dark:placeholder:text-gray-500 h-11 px-3 text-sm font-mono" placeholder="192.168.1.10" type="text"/>
</label>
<label class="flex flex-col gap-1.5 flex-[1.2]">
<span class="text-sm font-medium text-gray-700 dark:text-gray-200">Port</span>
<input class="form-input w-full rounded-lg bg-gray-50 dark:bg-input-bg border border-gray-300 dark:border-border-dark text-gray-900 dark:text-white focus:ring-1 focus:ring-primary focus:border-primary placeholder:text-gray-400 dark:placeholder:text-gray-500 h-11 px-3 text-sm font-mono text-center" placeholder="80" type="number" value="9600"/>
</label>
</div>
<!-- Credentials Row -->
<div class="flex gap-4">
<label class="flex flex-col gap-1.5 flex-1">
<span class="text-sm font-medium text-gray-700 dark:text-gray-200">Username</span>
<input class="form-input w-full rounded-lg bg-gray-50 dark:bg-input-bg border border-gray-300 dark:border-border-dark text-gray-900 dark:text-white focus:ring-1 focus:ring-primary focus:border-primary placeholder:text-gray-400 dark:placeholder:text-gray-500 h-11 px-3 text-sm" placeholder="admin" type="text"/>
</label>
<label class="flex flex-col gap-1.5 flex-1 relative group">
<span class="text-sm font-medium text-gray-700 dark:text-gray-200">Password</span>
<div class="relative">
<input class="form-input w-full rounded-lg bg-gray-50 dark:bg-input-bg border border-gray-300 dark:border-border-dark text-gray-900 dark:text-white focus:ring-1 focus:ring-primary focus:border-primary placeholder:text-gray-400 dark:placeholder:text-gray-500 h-11 px-3 pr-10 text-sm" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 cursor-pointer" type="button">
<span class="material-symbols-outlined text-[18px]">visibility</span>
</button>
</div>
</label>
</div>
<!-- Camera Purpose -->
<label class="flex flex-col gap-1.5">
<span class="text-sm font-medium text-gray-700 dark:text-gray-200">Camera Purpose</span>
<div class="relative">
<select class="form-select w-full rounded-lg bg-gray-50 dark:bg-input-bg border border-gray-300 dark:border-border-dark text-gray-900 dark:text-white focus:ring-1 focus:ring-primary focus:border-primary h-11 px-3 pr-10 text-sm appearance-none cursor-pointer">
<option disabled="" selected="" value="">Select a purpose...</option>
<option value="lpr">License Plate Detection (LPR)</option>
<option value="face">Driver Face Capture</option>
<option value="load">Load/Cargo View</option>
<option value="site">Site Overview</option>
</select>
<!-- Custom chevron using Material Symbols -->
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-gray-500">
<span class="material-symbols-outlined text-[20px]">expand_more</span>
</div>
</div>
</label>
<!-- Test Connection -->
<div class="mt-2 p-4 rounded-lg bg-gray-50 dark:bg-black/20 border border-gray-200 dark:border-border-dark flex items-center justify-between gap-4">
<div class="flex items-center gap-2.5">
<div class="h-2.5 w-2.5 rounded-full bg-gray-400 dark:bg-gray-600 animate-pulse"></div>
<span class="text-sm font-medium text-gray-600 dark:text-gray-400">Not tested</span>
</div>
<button class="group flex items-center gap-2 px-3 py-2 rounded text-sm font-medium text-gray-700 dark:text-primary border border-gray-300 dark:border-primary/30 hover:bg-gray-100 dark:hover:bg-primary/10 transition-all" type="button">
<span class="material-symbols-outlined text-[18px]">wifi_tethering</span>
                    Test Connection
                </button>
</div>
</div>
<!-- Footer -->
<div class="flex items-center justify-end gap-3 px-6 py-4 border-t border-gray-200 dark:border-border-dark bg-gray-50/50 dark:bg-[#132511]">
<button class="px-5 py-2.5 rounded-lg text-sm font-semibold text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-white/5 transition-colors">
                Cancel
            </button>
<button class="px-5 py-2.5 rounded-lg text-sm font-bold text-black bg-primary hover:bg-[#15bd0f] active:bg-[#12a30d] shadow-[0_0_15px_rgba(26,236,19,0.25)] transition-all flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">save</span>
                Save Camera
            </button>
</div>
</div>
</body></html>
