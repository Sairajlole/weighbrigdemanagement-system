<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Forgot Password - Weighbridge MS</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&amp;family=Source+Sans+3:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Config -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#508d4e",
                        "primary-hover": "#427a41",
                        "background-light": "#D6EFD8", // Specific user request overrides default theme
                        "background-dark": "#161c16",
                        "card-bg": "#ffffff",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"],
                        "body": ["Source Sans 3", "sans-serif"], // Adding requested font as secondary/body
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Source Sans 3', sans-serif; /* Per user request for body text */
        }
        h1, h2, h3, h4, h5, h6, .font-display {
            font-family: 'Manrope', sans-serif; /* Per theme request for headings */
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col items-center justify-center p-4">
<!-- Main Card Container -->
<main class="w-full max-w-[400px] bg-white dark:bg-zinc-800 rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.08)] overflow-hidden">
<!-- Header Section -->
<div class="pt-8 px-8 pb-4 text-center">
<!-- Icon for visual interest (optional but good for modern UI) -->
<div class="mx-auto w-12 h-12 bg-primary/10 rounded-full flex items-center justify-center mb-4 text-primary">
<span class="material-symbols-outlined text-[28px]">lock_reset</span>
</div>
<h1 class="text-[#131613] dark:text-white text-[24px] font-semibold font-display leading-tight mb-3">
                Reset Password
            </h1>
<p class="text-zinc-500 dark:text-zinc-400 text-[15px] font-normal leading-relaxed">
                Enter your email address and we'll send you a reset link
            </p>
</div>
<!-- Form Section -->
<div class="px-8 pb-8 pt-2">
<form action="#" class="flex flex-col gap-5" onsubmit="event.preventDefault();">
<!-- Email Input -->
<div class="flex flex-col gap-1.5">
<label class="text-[#131613] dark:text-gray-200 text-sm font-semibold" for="email">
                        Email Address
                    </label>
<div class="relative">
<input class="form-input block w-full rounded-lg border-gray-300 bg-white dark:bg-zinc-700 dark:border-zinc-600 dark:text-white dark:placeholder-zinc-400 focus:border-primary focus:ring-primary h-12 px-4 text-base shadow-sm placeholder:text-gray-400" id="email" name="email" placeholder="user@company.com" required="" type="email"/>
<div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-gray-400">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
</div>
</div>
<!-- Submit Button -->
<button class="flex w-full cursor-pointer items-center justify-center rounded-lg h-11 px-4 bg-primary hover:bg-primary-hover transition-colors text-white text-[15px] font-bold tracking-wide shadow-sm focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary" type="submit">
                    Send Reset Link
                </button>
<!-- Helper Text -->
<div class="text-center">
<p class="text-xs text-zinc-500 dark:text-zinc-400">
                        Check your spam folder if you don't see the email within a few minutes.
                    </p>
</div>
<!-- Divider -->
<div class="relative my-2">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-gray-200 dark:border-zinc-700"></div>
</div>
<div class="relative flex justify-center">
<span class="bg-white dark:bg-zinc-800 px-2 text-xs text-gray-400 uppercase tracking-wider">or</span>
</div>
</div>
<!-- Back to Login Link -->
<div class="text-center">
<a class="inline-flex items-center justify-center gap-1.5 text-sm font-semibold text-zinc-600 dark:text-zinc-300 hover:text-primary dark:hover:text-primary transition-colors group" href="#">
<span class="material-symbols-outlined text-[18px] transition-transform group-hover:-translate-x-1">arrow_back</span>
                        Back to Login
                    </a>
</div>
</form>
</div>
</main>
<!-- Footer / Branding (Optional Context) -->
<footer class="mt-8 text-center">
<p class="text-[#508d4e]/80 text-sm font-semibold tracking-tight">Weighbridge Management System</p>
</footer>
</body></html>
