<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Add Customer Modal</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1aec13",
                        "background-light": "#f6f8f6",
                        "background-dark": "#112210",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar for textarea if needed */
        textarea::-webkit-scrollbar {
            width: 8px;
        }
        textarea::-webkit-scrollbar-track {
            background: transparent;
        }
        textarea::-webkit-scrollbar-thumb {
            background-color: #d1d5db;
            border-radius: 20px;
        }
        .dark textarea::-webkit-scrollbar-thumb {
            background-color: #4b5563;
        }
    </style>
</head>
<body class="font-display bg-background-light dark:bg-background-dark min-h-screen flex flex-col relative overflow-hidden">
<!-- Background Decoration to simulate app context -->
<div class="absolute inset-0 z-0 opacity-10 pointer-events-none" data-alt="Abstract subtle dot pattern background" style="background-image: radial-gradient(#1aec13 1px, transparent 1px); background-size: 24px 24px;">
</div>
<!-- Modal Overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm p-4">
<!-- Modal Container -->
<div class="w-full max-w-[400px] bg-white dark:bg-[#1a1c1a] rounded-xl shadow-2xl flex flex-col overflow-hidden transform transition-all border border-gray-100 dark:border-gray-800">
<!-- Header -->
<div class="px-6 pt-6 pb-2 flex items-center justify-between">
<h3 class="text-[#111811] dark:text-white text-xl font-bold leading-tight tracking-[-0.015em]">
                    Add Customer
                </h3>
<button class="text-gray-500 hover:text-gray-900 dark:text-gray-400 dark:hover:text-white transition-colors rounded-full p-1 hover:bg-gray-100 dark:hover:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-primary/50">
<span class="material-symbols-outlined text-2xl">close</span>
</button>
</div>
<!-- Scrollable Content -->
<div class="px-6 py-2 flex flex-col gap-5">
<!-- Phone Number Field -->
<div class="flex flex-col gap-2">
<label class="text-[#111811] dark:text-gray-200 text-sm font-medium leading-normal">
                        Phone Number
                    </label>
<div class="relative">
<input class="form-input flex w-full rounded-lg text-[#111811] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#dce6db] dark:border-gray-700 bg-white dark:bg-gray-900 h-12 placeholder:text-[#638961] dark:placeholder:text-gray-500 px-4 text-sm font-normal transition-shadow" placeholder="e.g. +1 555-0199" type="tel" value=""/>
<div class="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-gray-400">
<span class="material-symbols-outlined text-[20px]">call</span>
</div>
</div>
</div>
<!-- Name Field -->
<div class="flex flex-col gap-2">
<label class="text-[#111811] dark:text-gray-200 text-sm font-medium leading-normal">
                        Customer Name
                    </label>
<div class="relative">
<input class="form-input flex w-full rounded-lg text-[#111811] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#dce6db] dark:border-gray-700 bg-white dark:bg-gray-900 h-12 placeholder:text-[#638961] dark:placeholder:text-gray-500 px-4 text-sm font-normal transition-shadow" placeholder="Enter full name" type="text" value=""/>
<div class="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-gray-400">
<span class="material-symbols-outlined text-[20px]">person</span>
</div>
</div>
</div>
<!-- Address Field -->
<div class="flex flex-col gap-2">
<label class="text-[#111811] dark:text-gray-200 text-sm font-medium leading-normal">
                        Address
                    </label>
<textarea class="form-input flex w-full resize-none rounded-lg text-[#111811] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#dce6db] dark:border-gray-700 bg-white dark:bg-gray-900 min-h-[100px] placeholder:text-[#638961] dark:placeholder:text-gray-500 p-4 text-sm font-normal transition-shadow" placeholder="Street address, City"></textarea>
</div>
</div>
<!-- Footer -->
<div class="px-6 py-6 mt-2 bg-gray-50 dark:bg-[#1a1c1a]/50 border-t border-gray-100 dark:border-gray-800">
<div class="flex gap-3 justify-end">
<button class="flex-1 min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-10 px-4 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 text-[#111811] dark:text-white text-sm font-bold leading-normal tracking-[0.015em] hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors focus:ring-2 focus:ring-gray-200 dark:focus:ring-gray-600">
<span class="truncate">Cancel</span>
</button>
<button class="flex-1 min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-10 px-4 bg-primary text-[#111811] text-sm font-bold leading-normal tracking-[0.015em] hover:bg-[#15bd0f] transition-colors shadow-lg shadow-primary/20 focus:ring-2 focus:ring-offset-2 focus:ring-primary dark:focus:ring-offset-gray-900">
<span class="truncate">Save Customer</span>
</button>
</div>
</div>
</div>
</div>
</body></html>
